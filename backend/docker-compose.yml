version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Employee Salary Estimator API"
      ENVIRONMENT: development
      API_PREFIX: /api/v1
      LOG_LEVEL: INFO
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres:5432/employee_salary"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ML_SERVICE_BASE_URL: ${ML_SERVICE_BASE_URL:-http://ml-service:8001}
      ML_SERVICE_API_KEY: ${ML_SERVICE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employee_salary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
